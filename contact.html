  <body>
    <header class="site-header">

    <main class="contact-page">
      <section class="contact-intro" aria-labelledby="contact-title">
        <h1 id="contact-title">Contact</h1>
        <p>I’m always up for a good chat - feel free to message me on any of my socials!</p>
      </section>

      <form class="contact-form" action="mailto:jeonhoon528@gmail.com" method="post" enctype="text/plain">
        <div class="form-row">
          <label>
            <span>Name</span>
            <input type="text" name="name" autocomplete="name" />
          </label>
          <label>
            <span>Company</span>
            <input type="text" name="company" autocomplete="organization" />
          </label>
        </div>
        <label>
          <span>Message</span>
          <textarea name="message" rows="8"></textarea>
        </label>
        <button type="submit">Submit</button>
      </form>

      <section class="contact-info" aria-labelledby="contact-info-title">
        <h2 id="contact-info-title">Contact info</h2>
        <dl>
          <div>
            <dt>Email</dt>
            <dd><a href="mailto:jeonhoon528@gmail.com">jeonhoon528@gmail.com</a></dd>
          </div>
          <div>
            <dt>Linkedin</dt>
            <dd>
              <a href="https://www.linkedin.com/in/hoon-jeon-5842951b8/">Linkedin_@jeonhoon</a>
            </dd>
          </div>
          <div>
            <dt>Youtube</dt>
            <dd><a href="https://www.youtube.com/@jeonhoon">@jeonhoon</a></dd>
          </div>
          <div>
            <dt>Github</dt>
            <dd><a href="https://github.com/jeonhoon528">@jeonhoon528</a></dd>
          </div>
        </dl>
      </section>
    </main>

    <footer class="site-footer">
      <p>© 2026 JeonHoon. Built with GitHub Pages.</p>
    </footer>
